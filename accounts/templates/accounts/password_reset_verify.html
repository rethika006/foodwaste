{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-header bg-info text-white text-center">
                    <h4 class="mb-0"><i class="fas fa-shield-alt"></i> Verify OTP</h4>
                </div>
                <div class="card-body">
                    <p>Enter the OTP sent to your registered email/phone.</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            {{ form.otp.label_tag }}
                            {{ form.otp }}
                            {% if form.otp.errors %}
                                <div class="text-danger small">{{ form.otp.errors }}</div>
                            {% endif %}
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-info">Verify OTP</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center">
                    <small><a href="{% url 'password_reset_request' %}">Resend OTP</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
