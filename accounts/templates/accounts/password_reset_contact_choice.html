{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-header bg-warning text-dark text-center">
                    <h4 class="mb-0"><i class="fas fa-envelope-open-text"></i> Choose OTP delivery method</h4>
                </div>
                <div class="card-body">
                    <p>Select where you want to receive your OTP.</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            {% if 'email' in methods %}
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="contact_method" id="methodEmail" value="email" checked>
                                    <label class="form-check-label" for="methodEmail">Email ({{ email }})</label>
                                </div>
                            {% endif %}
                            {% if 'phone' in methods %}
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="contact_method" id="methodPhone" value="phone" {% if 'email' not in methods %}checked{% endif %}>
                                    <label class="form-check-label" for="methodPhone">Phone ({{ phone }})</label>
                                </div>
                            {% endif %}
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-warning">Send OTP</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center">
                    <small><a href="{% url 'password_reset_request' %}">Use another username/email</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
